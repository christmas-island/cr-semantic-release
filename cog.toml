tag_prefix = "v"
ignore_merge_commits = true
skip_ci = "[skip ci]"

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
owner = "christmas-island"
repository = "cr-semantic-release"

# Map conventional commit types to changelog sections
# (matching the sections from the previous .releaserc.yaml)
[commit_types]

[commit_types.feat]
changelog_title = "Features"
bump_minor = true
order = 1

[commit_types.fix]
changelog_title = "Bug Fixes"
bump_patch = true
order = 2

[commit_types.perf]
changelog_title = "Performance Improvements"
bump_patch = true
order = 3

[commit_types.refactor]
changelog_title = "Code Refactoring"
bump_patch = true
order = 4

[commit_types.docs]
changelog_title = "Documentation"
omit_from_changelog = false
order = 5

[commit_types.style]
changelog_title = "Styles"
omit_from_changelog = false
order = 6

[commit_types.test]
changelog_title = "Tests"
omit_from_changelog = false
order = 7

[commit_types.build]
changelog_title = "Build System"
omit_from_changelog = false
order = 8

[commit_types.ci]
changelog_title = "Continuous Integration"
omit_from_changelog = false
order = 9

[commit_types.chore]
changelog_title = "Miscellaneous"
omit_from_changelog = false
order = 10

[git_hooks.commit-msg]
script = """#!/bin/sh
set -e
cog verify --file $1
"""
